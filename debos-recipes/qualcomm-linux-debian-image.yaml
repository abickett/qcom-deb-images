{{- $dtb := or .dtb "firmware" }}
{{- $bootloader := or .bootloader "systemd-boot" }}
{{- $imagesize := or .imagesize "4.5GiB" }}
{{- $imagetype := or .imagetype "ufs" }}
{{- $image := printf "disk-%s.img" $imagetype }}

architecture: arm64
sectorsize: {{if eq $imagetype "ufs"}}4096{{else}}512{{end}}

actions:
  - action: unpack
    description: Unpack root filesystem
    compression: gz
    file: rootfs.tar.gz

{{- if ne $dtb "firmware" }}
  - action: run
    description: Use OS device tree override (board specific)
    chroot: true
    command: |
      set -eux
      mkdir -pv /etc/kernel
      echo "{{ $dtb }}" >/etc/kernel/devicetree
{{- end }}

  # parttype values are from:
  # https://www.freedesktop.org/wiki/Specifications/DiscoverablePartitionsSpec/
  - action: image-partition
    description: Create an image file
    imagename: {{ $image }}
    imagesize: {{ $imagesize }}
    partitiontype: gpt
    partitions:
      - name: esp
        partlabel: ESP
        flags: [ boot, esp ]
        # EFI System Partition
        parttype: c12a7328-f81f-11d2-ba4b-00a0c93ec93b
        fs: vfat
        start: 4MiB
        # size of 512MiB
        end: 516MiB
        fsck: true
      - name: root
        # Root Partition (64-bit ARM/AArch64)
        parttype: b921b045-1df0-41c3-af44-4c6f280d3fae
        fs: ext4
        # 4MiB after ESP
        start: 520MiB
        end: 100%
        fsck: true
    mountpoints:
      - mountpoint: /boot/efi/
        partition: esp
      - mountpoint: /
        partition: root

  # XXX these kernel options might be specific to a kernel version or board
  - action: filesystem-deploy
    description: Deploy root filesystem to mounted image
    setup-fstab: true
    append-kernel-cmdline: clk_ignore_unused pd_ignore_unused audit=0 deferred_probe_timeout=30

{{- if eq $bootloader "grub" }}
  - action: apt
    description: Install GRUB bootloader packages
    recommends: true
    packages:
      - grub-efi-arm64
      - grub-efi-arm64-bin
      - grub2-common

  - action: run
    description: Install and configure GRUB bootloader
    chroot: true
    command: |
      set -eux
      
      # Install GRUB to ESP
      grub-install --target=arm64-efi --efi-directory=/boot/efi \
          --bootloader-id=debian --recheck --no-floppy
      
      # Configure GRUB defaults using drop-in files (proper way, no core modifications)
      mkdir -p /etc/default/grub.d
      
      # Create qcom-cmdline.cfg for easily customizable kernel parameters
      cat >/etc/default/grub.d/qcom-cmdline.cfg <<'EOF'
      # Qualcomm-specific kernel command line parameters
      # This file is sourced by /etc/default/grub
      #
      # CUSTOMIZE THIS FILE to add board-specific or debugging parameters
      # After editing, run: sudo update-grub
      #
      # Required Qualcomm parameters (DO NOT REMOVE):
      #   clk_ignore_unused          - Prevents disabling unused clocks
      #   pd_ignore_unused           - Prevents disabling unused power domains
      #   deferred_probe_timeout=30  - Extends device probe timeout
      
      GRUB_CMDLINE_LINUX_DEFAULT="quiet clk_ignore_unused pd_ignore_unused audit=0 deferred_probe_timeout=30"
      EOF
      
      # Create 99-qcom.cfg for other GRUB settings
      cat >/etc/default/grub.d/99-qcom.cfg <<'EOF'
      # Qualcomm-specific GRUB configuration
      # This file is sourced by /etc/default/grub
      
      GRUB_TIMEOUT=5
      GRUB_DISABLE_OS_PROBER=true
      
      # Enable serial console for debugging
      GRUB_TERMINAL="console serial"
      GRUB_SERIAL_COMMAND="serial --unit=0 --speed=115200"
      
      # Ensure kernel version is shown in menu entries
      # Empty GRUB_DISTRIBUTOR means GRUB will use "Debian GNU/Linux, with Linux X.X.X"
      GRUB_DISTRIBUTOR=""
      EOF
      
      # Generate GRUB configuration
      update-grub
      
      # Create fallback bootloader for removable media (USB/SD cards)
      # UEFI spec requires /EFI/BOOT/BOOTAA64.EFI for removable media
      mkdir -p /boot/efi/EFI/BOOT
      cp /boot/efi/EFI/debian/grubaa64.efi /boot/efi/EFI/BOOT/BOOTAA64.EFI
      
      echo "GRUB installation complete"
      echo "GRUB config location: /boot/grub/grub.cfg"
      echo "EFI bootloader: /boot/efi/EFI/debian/grubaa64.efi"
      echo "Fallback bootloader: /boot/efi/EFI/BOOT/BOOTAA64.EFI"
{{- else }}
  - action: apt
    description: Make system bootable with systemd-boot
    recommends: true
    packages:
      - systemd-boot
      # TODO investigate why systemd-boot Recommends: shim-signed which
      # Depends on grub packages
      - shim-signed-
{{- end }}

  # this is to provide an updated copy of DTBs from the OS to U-Boot, notably
  # on RB1
  - action: run
    description: Setup copying of DTBs to ESP partition
    chroot: true
    command: |
      set -eux
      # Fixes error when running outside qemu
      dpkg-divert --local --rename --add /etc/kernel/postinst.d/u-boot-efi-dtb
      ln -s /bin/true /etc/kernel/postinst.d/u-boot-efi-dtb
      # u-boot-efi-dtb installs a kernel hook that will trigger on kernel
      # installation/upgrade, but also calls it explicitely in its postinst in
      # case it was installed after the kernel; it requires an ESP partition to
      # copy the DTBs though, so install it after the ESP partition is
      # available
      apt -y install u-boot-efi-dtb
      # Removing previous diversion and symlink
      rm /etc/kernel/postinst.d/u-boot-efi-dtb
      dpkg-divert --rename --remove /etc/kernel/postinst.d/u-boot-efi-dtb
      # when building under debos, /sys/firmware/efi is not always present, so
      # the u-boot-efi-dtb postinst doesn't install an initial copy of the
      # DTBs; do this once here
      latest_kernel="$(
          linux-version list | linux-version sort --reverse | head -1)"
      dtb_path="/usr/lib/linux-image-${latest_kernel}"
      cp -RT "$dtb_path" "/boot/efi/dtb"

{{- if eq $bootloader "grub" }}
  - action: run
    description: Configure GRUB to load device tree
    chroot: true
    command: |
      set -eux
      
      # Only configure DTB support if a specific DTB is requested
      if [ ! -f /etc/kernel/devicetree ]; then
          echo "No device tree override specified, GRUB will use firmware DTB"
          exit 0
      fi
      
      DTB_PATH=$(cat /etc/kernel/devicetree | tr -d '\n')
      if [ -z "$DTB_PATH" ]; then
          echo "Empty device tree path, GRUB will use firmware DTB"
          exit 0
      fi
      
      echo "Configuring GRUB for device tree: $DTB_PATH"
      
      # Protect original 10_linux from grub-common updates using dpkg-divert
      dpkg-divert --add --rename --divert /etc/grub.d/10_linux.orig /etc/grub.d/10_linux
      
      # Create wrapper that adds devicetree support
      # This wrapper extracts kernel version from initrd path and uses DTBs from /usr/lib/linux-image-*
      cat >/etc/grub.d/10_linux <<'GRUBEOF'
      #!/bin/sh
      set -e
      
      # Wrapper for 10_linux that adds devicetree support
      
      # Check if devicetree is specified
      if [ ! -f /etc/kernel/devicetree ]; then
          exec /etc/grub.d/10_linux.orig
      fi
      
      DTB_PATH=$(cat /etc/kernel/devicetree | tr -d '\n')
      if [ -z "$DTB_PATH" ]; then
          exec /etc/grub.d/10_linux.orig
      fi
      
      # Run original and add devicetree command after each initrd line
      # Extract kernel version from initrd path and use it for DTB path in /usr/lib/linux-image-*
      # Pattern matches lines like: initrd /boot/initrd.img-6.1.0-28-arm64
      /etc/grub.d/10_linux.orig | sed -E "s|^([[:space:]]*initrd[[:space:]]+.*/initrd\.img-([0-9]+\.[0-9]+\.[0-9]+[^[:space:]]*))|\1\n\tdevicetree /usr/lib/linux-image-\2/${DTB_PATH}|"
      GRUBEOF
      
      chmod +x /etc/grub.d/10_linux
      
      # Regenerate GRUB config with DTB support
      update-grub
      
      echo "GRUB configured for device tree support"
      echo "Device tree: $DTB_PATH"
{{- end }}

  - action: run
    description: Create task to grow root filesystem on first boot
    chroot: true
    command: |
      set -eux
      # for growpart
      apt -y install cloud-guest-utils
      # extract the dev of the root filesystem from fstab; change UUID=id into
      # /dev/disk/by-uuid/id
      ROOTFS_DEV=$(
          awk '$2 == "/" {gsub("UUID=", "/dev/disk/by-uuid/"); print $1}' \
              /etc/fstab
          )
      # generate systemd unit to grow the second partition with above UUID
      cat >/etc/systemd/system/debos-grow-rootfs.service <<EOF
      [Unit]
      Description=Grow root partition and filesystem (debos)
      [Service]
      Type=oneshot
      ExecStartPre=-sh -c 'growpart /dev/\`lsblk -n -o pkname $ROOTFS_DEV\` 2'
      ExecStart=resize2fs $ROOTFS_DEV
      [Install]
      WantedBy=default.target
      EOF
      # enable unit
      systemctl enable debos-grow-rootfs

  - action: run
    description: Extract partition images
    postprocess: true
    command: |
      set -eux
      sector_size="{{if eq $imagetype "ufs"}}4096{{else}}512{{end}}"
      image="{{ $image }}"
      fdisk -b "${sector_size}" -l "${image}" |
          sed -n '1,/^Device/ d; p' |
          while read name start end sectors rest; do
              dd if="${image}" of="${ARTIFACTDIR}/${name}" \
                  bs="${sector_size}" skip="${start}" count="${sectors}"
          done

  - action: run
    description: Add compressed image file
    postprocess: true
    command: gzip -v -f -k "${ARTIFACTDIR}/{{ $image }}"

